name: Fetch FRED Data

on:
  schedule:
    # Weekdays 1:30 PM UTC (8:30 AM ET) — catches most morning data releases
    - cron: '30 13 * * 1-5'
    # Thursdays 5:00 PM UTC (noon ET) — catches Freddie Mac PMMS (mortgage rates)
    - cron: '0 17 * * 4'
  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

# Opt into Node.js 24 now to silence the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the data commit back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -W ignore scripts/fetch_fred.py

      - name: Build dashboard data
        run: python -W ignore scripts/build_dashboard_data.py

      - name: Build release calendar
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -W ignore scripts/build_release_calendar.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/dashboard_data.json \
                  dashboard/data/dashboard_data.json \
                  dashboard/data/release_calendar.json \
                  dashboard/release-calendar.ics
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "data: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
